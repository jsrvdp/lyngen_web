name: Update AROME data

on:
  schedule:
    - cron: '40 2,5,8,11,14,17,20,23 * * *'   # mismo horario que antes
  workflow_dispatch:                              # lanzar manualmente desde GitHub

# Permiso para que el workflow pueda hacer push al repo
permissions:
  contents: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python deps
        run: pip install netCDF4 numpy

      - name: Fetch AROME data
        run: python fetch_arome_v2.py

      - name: Commit and push arome_data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add arome_data.json
          git diff --staged --quiet || git commit -m "AROME update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
